# ================= Itihaas Auto-Bot config (PRODUCTION) =================
channel:
  name: "Itihaas Ki Kahaniyan"        # change to your channel name
  language: "hi"                       # Hindi narration
  default_tags: ["history","itihaas","true story","history in hindi","documentary"]
  upload_privacy: "public"            # public | unlisted | private

video:
  target_minutes: 40                   # full length (<=45 cap)
  max_minutes: 45
  resolution: [1920, 1080]
  fps: 30
  visual_style: "hybrid"               # archival photos (Ken Burns) + stock B-roll
  kenburns_zoom: 1.10
  captions: true                       # burn Hindi subtitles (non-fatal if it fails)
  intro_clip: "assets/branding/intro.mp4"   # optional
  outro_clip: "assets/branding/outro.mp4"   # optional

voice:
  primary: "hi-IN-MadhurNeural"        # male | female: hi-IN-SwaraNeural
  rate: "+0%"
  pitch: "+0Hz"

music:
  volume_db: -22
  sources: ["local"]                   # local = assets/music/*.mp3
  folder: "assets/music"

media:
  images_per_minute: 6
  sources: ["wikimedia", "loc", "met", "archive", "openverse", "pexels"]
  stock_video_ratio: 0.35
  safe_search: true

reels:
  enabled: true
  length_seconds: 45
  aspect: "9:16"
  hook_from: "intro"

schedule:                              # IST (Asia/Kolkata)
  timezone: "Asia/Kolkata"
  slots: ["07:00", "13:00", "18:00"]

paths:
  output_dir: "output"
  data_dir: "data"
  logs_dir: "logs"
